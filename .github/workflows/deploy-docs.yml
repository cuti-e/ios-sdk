name: Deploy Docs

on:
  push:
    branches: [main]
    paths: ["docs/**"]
  workflow_dispatch:

jobs:
  notify-unified-docs:
    runs-on: arc-linux-ios-sdk
    steps:
      - name: Trigger unified docs rebuild
        run: |
          gh api repos/Stig-Johnny/claude-3/dispatches \\
            -f event_type=docs-updated \\
            -f 'client_payload[repo]=${{ github.repository }}'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
