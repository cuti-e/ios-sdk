name: Request Review-E Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
    branches: [main]

jobs:
  request-review:
    name: Request Review-E
    runs-on: arc-linux-ios-sdk
    if: >-
      !github.event.pull_request.draft &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      !contains(github.event.pull_request.labels.*.name, 'manual-merge')
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Request review from Review-E
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const pr_number = context.payload.pull_request.number;
            const pr_author = context.payload.pull_request.user.login;

            // Don't request review from self
            if (pr_author === 'review-e-dashecorp') {
              console.log('PR author is Review-E, skipping');
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr_number,
                reviewers: ['review-e-dashecorp']
              });
              console.log(`Requested review from review-e-dashecorp on PR #${pr_number}`);
            } catch (error) {
              console.log(`Failed to request review: ${error.message}`);
            }

      - name: Notify in Discord thread and store message ID
        if: >-
          github.event.pull_request.user.login != 'review-e-dashecorp'
        env:
          WEBHOOK_URL: ${{ secrets.REVIEW_E_DISCORD_WEBHOOK }}
          BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const webhookUrl = process.env.WEBHOOK_URL;
            if (!webhookUrl) {
              console.log('No webhook secret set, skipping');
              return;
            }

            const pr = context.payload.pull_request;
            const repo = context.repo.repo;
            const number = pr.number;
            const title = pr.title;
            const author = pr.user.login;
            const url = pr.html_url;

            // GitHub username → Discord mention
            const AGENT_MENTIONS = {
              'PiE-Derby': '<@1477270576765735024>',
              'volt-e': '<@1477272514332852416>',
              'mac-executor': '`iBuild-E`',
            };
            const authorMention = AGENT_MENTIONS[author] || `\`${author}\``;
            const reviewEMention = '<@1477785888095473798>';

            // Step 1: Post notification to #tasks (no @mention — thread gets the mention)
            const channelMessage = `**New PR ready for review:** ${repo} #${number}\n` +
              `**Title:** ${title}\n` +
              `**Author:** ${authorMention}\n` +
              `**Link:** ${url}`;

            try {
              const response = await fetch(`${webhookUrl}?wait=true`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  content: channelMessage,
                  allowed_mentions: { parse: [] }
                })
              });

              if (!response.ok) {
                console.log(`Discord notification failed: ${response.status}`);
                return;
              }

              const data = await response.json();
              const messageId = data.id;
              const channelId = data.channel_id;
              console.log(`Discord notification sent, message ID: ${messageId}`);

              // Step 2: Create thread on the notification message
              const botToken = process.env.BOT_TOKEN;
              if (botToken) {
                const threadRes = await fetch(
                  `https://discord.com/api/v10/channels/${channelId}/messages/${messageId}/threads`,
                  {
                    method: 'POST',
                    headers: {
                      'Authorization': `Bot ${botToken}`,
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                      name: `Review: ${repo} #${number}`,
                      auto_archive_duration: 4320
                    })
                  }
                );

                if (threadRes.ok) {
                  console.log(`Thread created: Review: ${repo} #${number}`);

                  // Step 3: Post @Review-E mention in the thread
                  const threadMsg = await fetch(`${webhookUrl}?thread_id=${messageId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      content: `${reviewEMention} **Review requested**\n\nreview ${repo} #${number}`,
                      allowed_mentions: { parse: [], users: ['1477785888095473798'] }
                    })
                  });
                  if (threadMsg.ok) {
                    console.log('Posted review request in thread');
                  } else {
                    console.log(`Thread message failed: ${threadMsg.status}`);
                  }
                } else {
                  console.log(`Thread creation failed: ${threadRes.status}`);
                }
              } else {
                console.log('No DISCORD_BOT_TOKEN, skipping thread creation');
              }

              // Step 4: Upsert Discord message ID in PR comment
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                per_page: 100
              });

              const marker = comments.find(c => c.body.includes('discord-review-msg-id:'));
              const commentBody = `Discord review thread metadata (do not remove)\n` +
                `<!-- discord-review-msg-id:${messageId} -->\n` +
                `<!-- discord-review-channel:${channelId} -->`;

              if (marker) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: marker.id,
                  body: commentBody
                });
                console.log('Updated existing Discord message ID in PR comment');
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                  body: commentBody
                });
                console.log('Stored Discord message ID in PR comment');
              }
            } catch (error) {
              console.log(`Discord notification error (non-fatal): ${error.message}`);
            }
