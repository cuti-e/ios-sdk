name: Request Review-E Review

on:
  pull_request:
    types: [opened, ready_for_review]
    branches: [main]

jobs:
  request-review:
    name: Request Review-E
    runs-on: arc-linux-ios-sdk
    if: >-
      !github.event.pull_request.draft &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      !contains(github.event.pull_request.labels.*.name, 'manual-merge')
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Request review from Review-E
        uses: actions/github-script@v8
        with:
          script: |
            const pr_number = context.payload.pull_request.number;
            const pr_author = context.payload.pull_request.user.login;

            // Don't request review from self
            if (pr_author === 'review-e-dashecorp') {
              console.log('PR author is Review-E, skipping');
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr_number,
                reviewers: ['review-e-dashecorp']
              });
              console.log(`Requested review from review-e-dashecorp on PR #${pr_number}`);
            } catch (error) {
              console.log(`Failed to request review: ${error.message}`);
            }

      - name: Notify in Discord and store message ID
        if: >-
          github.event.pull_request.user.login != 'review-e-dashecorp'
        env:
          WEBHOOK_URL: ${{ secrets.REVIEW_E_DISCORD_WEBHOOK }}
        uses: actions/github-script@v8
        with:
          script: |
            const webhookUrl = process.env.WEBHOOK_URL;
            if (!webhookUrl) {
              console.log('No webhook secret set, skipping');
              return;
            }

            const pr = context.payload.pull_request;
            const repo = context.repo.repo;
            const number = pr.number;
            const title = pr.title;
            const author = pr.user.login;
            const url = pr.html_url;

            // GitHub username → Discord mention
            const AGENT_MENTIONS = {
              'PiE-Derby': '<@1477270576765735024>',
              'volt-e': '<@1477272514332852416>',
              'mac-executor': '`iBuild-E`',
            };
            const authorMention = AGENT_MENTIONS[author] || `\`${author}\``;
            const reviewEMention = '<@1477785888095473798>';

            const message = `${reviewEMention} **New PR ready for review:** ${repo} #${number}\n` +
              `**Title:** ${title}\n` +
              `**Author:** ${authorMention}\n` +
              `**Link:** ${url}\n\n` +
              `review ${repo} #${number}`;

            try {
              const response = await fetch(`${webhookUrl}?wait=true`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  content: message,
                  allowed_mentions: { parse: [], users: ['1477785888095473798'] }
                })
              });

              if (!response.ok) {
                console.log(`Discord notification failed: ${response.status}`);
                return;
              }

              const data = await response.json();
              const messageId = data.id;
              console.log(`Discord notification sent, message ID: ${messageId}`);

              // Upsert: find existing marker comment or create new one
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                per_page: 100
              });

              const marker = comments.find(c => c.body.includes('discord-review-msg-id:'));
              const commentBody = `Discord review thread metadata (do not remove)\n` +
                `<!-- discord-review-msg-id:${messageId} -->\n` +
                `<!-- discord-review-channel:${data.channel_id} -->`;

              if (marker) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: marker.id,
                  body: commentBody
                });
                console.log('Updated existing Discord message ID in PR comment');
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                  body: commentBody
                });
                console.log('Stored Discord message ID in PR comment');
              }
            } catch (error) {
              console.log(`Discord notification error (non-fatal): ${error.message}`);
            }
